<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Calorie Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <div class="intro-screen" id="signup-screen">
    <div class="intro-bg-orb intro-orb-1"></div>
    <div class="intro-bg-orb intro-orb-2"></div>
    <div class="intro-bg-orb intro-orb-3"></div>
    <div class="intro-content">
      <div class="intro-logo" aria-hidden="true">🥗</div>
      <p class="intro-eyebrow">Food Nutrition Tracker</p>
      <h1 class="intro-title">Create your<br>account.</h1>
      <p class="intro-sub">Sign up with Google to track your meals and sync across all your devices.</p>
      <div class="intro-actions">
        <button id="signup-google-btn" class="intro-google-btn">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>
        <p class="intro-signup-link">Already have an account? <a href="/" class="intro-link">Sign in →</a></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { FIREBASE_CONFIG, FIREBASE_ENABLED } from '/firebase-config.js';

    if (FIREBASE_ENABLED) {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'),
      ]);
      const app  = appMod.initializeApp(FIREBASE_CONFIG);
      const auth = authMod.getAuth(app);
      const { GoogleAuthProvider, signInWithPopup, signOut } = authMod;

      // Sign out any existing session so this is a fresh sign-up flow.
      await signOut(auth).catch(() => {});

      document.getElementById('signup-google-btn').addEventListener('click', async () => {
        try {
          const provider = new GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          await signInWithPopup(auth, provider);
          window.location.href = '/';
        } catch (e) {
          if (e.code !== 'auth/popup-closed-by-user') console.error('Sign-up error:', e);
        }
      });
    }
  </script>
</body>
</html>
